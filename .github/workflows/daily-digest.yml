name: Daily Digest

on:
  schedule:
    - cron: "0 7 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

jobs:
  trigger-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily digest
        run: |
          curl -fsS -X POST "$DIGEST_JOB_URL" \
            -H "x-job-secret: $JOB_SECRET"
        env:
          DIGEST_JOB_URL: ${{ secrets.DIGEST_JOB_URL }}
          JOB_SECRET: ${{ secrets.JOB_SECRET }}
